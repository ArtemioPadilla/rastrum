<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <path d="M 0 100 C 0 20, 20 0, 100 0 C 100 80, 80 100, 0 100 Z" fill="#2E8B57" />

  <path d="M 0 100 C 40 60, 60 40, 100 0 C 100 80, 80 100, 0 100 Z" fill="#247548" />

  <g stroke="#4AC27E" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6">
    <path d="M 5 95 C 35 65, 65 35, 95 5" />
    <path d="M 25 75 C 20 55, 10 40" />
    <path d="M 45 55 C 35 35, 20 20" />
    <path d="M 45 55 C 65 65, 80 80" />
    <path d="M 75 25 C 85 35, 90 45" />
  </g>

  <g transform="translate(0, -2)" fill="#FFFFFF">
    <!-- Almohadilla principal — más grande y ancha, auténtica de jaguar -->
    <path d="M 31 57
      C 34 51, 41 48, 48 53
      Q 50 55.5, 52 53
      C 59 48, 66 51, 69 57
      C 74 63, 74 69, 69 74
      C 67 78, 61 79, 57 74
      C 53.5 78, 46.5 78, 43 74
      C 39 79, 33 78, 31 74
      C 26 69, 26 63, 31 57 Z" />

    <!-- Dedos — más redondeados, sin garras (felino retráctil) -->
    <ellipse cx="28" cy="45" rx="6.5" ry="9" transform="rotate(-38 28 45)" />
    <ellipse cx="39" cy="29" rx="7" ry="9.5" transform="rotate(-14 39 29)" />
    <ellipse cx="59" cy="28" rx="7" ry="9.5" transform="rotate(14 59 28)" />
    <ellipse cx="72" cy="42" rx="6.5" ry="9" transform="rotate(38 72 42)" />

    <!-- Sin garras — los jaguares son felinos con garras retráctiles
         y no dejan marca de garra en sus huellas -->
  </g>
</svg>
