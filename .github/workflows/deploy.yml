name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Allow only one concurrent deployment. Don't cancel in-progress runs so
  # production deploys always finish.
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Extract version
        id: pkg
        run: echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"
      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build
        run: npm run build
        env:
          PUBLIC_SUPABASE_URL:        ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY:   ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          PUBLIC_R2_MEDIA_URL:        ${{ secrets.PUBLIC_R2_MEDIA_URL }}
          PUBLIC_R2_TILES_URL:        ${{ secrets.PUBLIC_R2_TILES_URL }}
          PUBLIC_PLANTNET_KEY:        ${{ secrets.PUBLIC_PLANTNET_KEY }}
          PUBLIC_ANTHROPIC_KEY:       ${{ secrets.PUBLIC_ANTHROPIC_KEY }}
          PUBLIC_BIRDNET_WEIGHTS_URL: ${{ secrets.PUBLIC_BIRDNET_WEIGHTS_URL }}
          PUBLIC_ONNX_BASE_URL:       ${{ secrets.PUBLIC_ONNX_BASE_URL }}
          PUBLIC_PMTILES_MX_URL:      ${{ secrets.PUBLIC_PMTILES_MX_URL }}
          PUBLIC_MEGADETECTOR_WEIGHTS_URL: ${{ secrets.PUBLIC_MEGADETECTOR_WEIGHTS_URL }}
          PUBLIC_MEGADETECTOR_ENDPOINT: ${{ secrets.PUBLIC_MEGADETECTOR_ENDPOINT }}
          PUBLIC_BUILD_SHA:           ${{ github.sha }}
          PUBLIC_VERSION:             ${{ steps.pkg.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  smoke-model-assets:
    # Verifies that every operator-configured PUBLIC_*_URL points at a
    # reachable, CORS-open file with the expected content-length range.
    # Catches the case where the deploy went out fine but R2 is
    # misconfigured / file got renamed / CORS got revoked, so the
    # on-device cascade silently falls back. Runs after deploy so it
    # doesn't block a working deploy on an asset hiccup, but goes red
    # in CI so the operator sees it.
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Smoke-test model asset URLs
        run: bash infra/smoke-model-assets.sh
        env:
          PUBLIC_BIRDNET_WEIGHTS_URL:      ${{ secrets.PUBLIC_BIRDNET_WEIGHTS_URL }}
          PUBLIC_ONNX_BASE_URL:            ${{ secrets.PUBLIC_ONNX_BASE_URL }}
          PUBLIC_PMTILES_MX_URL:           ${{ secrets.PUBLIC_PMTILES_MX_URL }}
          PUBLIC_MEGADETECTOR_WEIGHTS_URL: ${{ secrets.PUBLIC_MEGADETECTOR_WEIGHTS_URL }}
