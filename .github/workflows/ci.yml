name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress PR runs when new commits arrive — saves CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build (static site)
        run: npm run build
        env:
          PUBLIC_SUPABASE_URL:       ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY:  ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          PUBLIC_R2_MEDIA_URL:       ${{ secrets.PUBLIC_R2_MEDIA_URL }}
          PUBLIC_R2_TILES_URL:       ${{ secrets.PUBLIC_R2_TILES_URL }}

      - name: Report bundle size
        run: |
          echo "## Build size" >> $GITHUB_STEP_SUMMARY
          du -sh dist >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Largest files" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find dist -type f \( -name '*.js' -o -name '*.css' -o -name '*.html' \) \
            -exec du -h {} + | sort -rh | head -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

