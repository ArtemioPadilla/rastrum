name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
    inputs:
      function:
        description: 'Function name to deploy (or "all")'
        required: true
        default: all
        type: choice
        options:
          - all
          - get-upload-url
          - identify
          - enrich-environment
          - recompute-streaks
          - award-badges
          - share-card

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: reppvlqejgoqvitturxp
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy
        run: |
          set -e
          # Functions that don't require a user JWT at the Edge layer:
          #   share-card        — OG scrapers fetch anonymously
          #   recompute-streaks — cron-only; gates internally on service-role
          #   award-badges      — cron-only; gates internally on service-role
          NO_JWT="share-card recompute-streaks award-badges"
          deploy_one() {
            local fn="$1"
            local flag=""
            for nj in $NO_JWT; do [ "$fn" = "$nj" ] && flag="--no-verify-jwt"; done
            echo "→ deploying $fn $flag"
            supabase functions deploy "$fn" --project-ref "$PROJECT_REF" $flag
          }
          if [ "${{ inputs.function }}" = "all" ]; then
            for fn in get-upload-url identify enrich-environment recompute-streaks award-badges share-card; do
              deploy_one "$fn"
            done
          else
            deploy_one "${{ inputs.function }}"
          fi
