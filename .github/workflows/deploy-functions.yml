name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
    inputs:
      function:
        description: 'Function name to deploy (or "all")'
        required: true
        default: all
        type: choice
        options:
          - all
          - get-upload-url
          - identify
          - enrich-environment
          - recompute-streaks
          - award-badges
          - share-card
          - export-dwca
          - mcp
          - api
          - plantnet-monitor
          - streak-push
          - sync-error
      sync_secrets:
        description: 'Sync GitHub Actions secrets → Supabase Edge Function secrets before deploy'
        required: false
        default: true
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: reppvlqejgoqvitturxp
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Sync GitHub secrets → Supabase
        # Single source of truth: GitHub Actions secrets. Each secret is
        # only pushed if non-empty in CI (no clobbering existing Supabase
        # values with empty strings). Skip with `sync_secrets=false` when
        # you need to deploy code without touching credentials.
        if: ${{ inputs.sync_secrets != false }}
        env:
          # R2 / Cloudflare
          CF_ACCOUNT_ID:        ${{ secrets.CF_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME:       ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL:        ${{ secrets.R2_PUBLIC_URL }}
          # Identifier providers (operator-shared keys)
          PLANTNET_API_KEY:     ${{ secrets.PLANTNET_API_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          # Web Push (VAPID private; the public half is built into the bundle)
          VAPID_PRIVATE_KEY:    ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT:        ${{ secrets.VAPID_SUBJECT }}
          # Stripe (subscription tier — see runbook stripe-pro-tier.md)
          STRIPE_SECRET_KEY:    ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          set -e
          push_secret() {
            local name="$1"
            # Read the env var via indirect expansion so `set -u` and
            # logs don't leak the value.
            local val="${!name:-}"
            if [ -n "$val" ]; then
              echo "→ syncing $name"
              # supabase CLI accepts repeated KEY=VALUE pairs; we set one
              # at a time so a single bad value doesn't silently fail
              # the rest. The CLI never echoes values.
              supabase secrets set "$name=$val" --project-ref "$PROJECT_REF" >/dev/null
            else
              echo "→ skipping $name (not set in GitHub Actions)"
            fi
          }
          for k in \
            CF_ACCOUNT_ID R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY R2_BUCKET_NAME R2_PUBLIC_URL \
            PLANTNET_API_KEY ANTHROPIC_API_KEY \
            VAPID_PRIVATE_KEY VAPID_SUBJECT \
            STRIPE_SECRET_KEY STRIPE_WEBHOOK_SECRET
          do
            push_secret "$k"
          done

      - name: Deploy
        run: |
          set -e
          # Functions that don't require a user JWT at the Edge layer:
          #   share-card        — OG scrapers fetch anonymously
          #   recompute-streaks — cron-only; gates internally on service-role
          #   award-badges      — cron-only; gates internally on service-role
          #   plantnet-monitor  — cron-only; gates internally on service-role
          #   streak-push       — cron-only; gates internally on service-role
          #   mcp / api         — gate internally on rst_ tokens (not JWTs)
          NO_JWT="share-card recompute-streaks award-badges plantnet-monitor streak-push mcp api"
          deploy_one() {
            local fn="$1"
            local flag=""
            for nj in $NO_JWT; do [ "$fn" = "$nj" ] && flag="--no-verify-jwt"; done
            echo "→ deploying $fn $flag"
            supabase functions deploy "$fn" --project-ref "$PROJECT_REF" $flag
          }
          if [ "${{ inputs.function }}" = "all" ]; then
            for fn in get-upload-url identify enrich-environment recompute-streaks award-badges share-card export-dwca mcp api plantnet-monitor streak-push sync-error; do
              deploy_one "$fn"
            done
          else
            deploy_one "${{ inputs.function }}"
          fi

      - name: Audit CORS on every browser-facing function
        # Catches the class of bug where a function ships without proper
        # CORS headers and silently breaks every browser POST. See
        # docs/runbooks/post-launch-improvements.md (#7).
        run: |
          # Give Supabase a beat to propagate the deploy.
          sleep 5
          ./scripts/audit-edge-cors.sh
