name: Deploy Supabase Edge Functions

# Auto-deploys on push to main when any function code changes (path-filtered),
# only re-deploying the functions whose files actually changed. Manual
# `workflow_dispatch` is preserved for surgical rollbacks, redeploys, or
# secrets-only resync.
#
# Why auto-deploy: shipping merged-but-undeployed functions silently broke
# Module 26 in prod (UI returned 404 for follow/react/report). Symmetric with
# `db-apply.yml`, which already auto-applies schema changes on path-filtered
# push. Functions and schema are equally critical to a working app.
on:
  workflow_dispatch:
    inputs:
      function:
        # NOTE: this enum is a UX nicety for the dropdown only. The actual
        # "deploy all" path reads the function set from the filesystem
        # (`ls supabase/functions/`) at runtime, so missing entries here
        # don't block deploys — they just mean the dropdown won't list
        # them. Add new function directories to keep the dropdown
        # complete; the workflow won't drift if you forget.
        description: 'Function name to deploy (or "all")'
        required: true
        default: all
        type: choice
        options:
          - all
          - admin
          - get-upload-url
          - identify
          - enrich-environment
          - recompute-streaks
          - award-badges
          - share-card
          - sponsorships
          - export-dwca
          - mcp
          - api
          - plantnet-monitor
          - streak-push
          - sync-error
          - delete-observation
          - follow
          - react
          - report
      sync_secrets:
        description: 'Sync GitHub Actions secrets → Supabase Edge Function secrets before deploy'
        required: false
        default: true
        type: boolean
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: reppvlqejgoqvitturxp
    steps:
      - uses: actions/checkout@v4
        with:
          # Need at least 2 commits so we can diff against the parent on push.
          fetch-depth: 2

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Determine deploy targets
        id: targets
        run: |
          set -e
          # Single source of truth for "all functions": directory names under
          # supabase/functions/. No hardcoded list to drift. The choice enum
          # above is just a UX nicety for the dropdown; the actual deploy
          # loop reads from the filesystem.
          ALL_FNS=$(ls -d supabase/functions/*/ 2>/dev/null \
            | xargs -n1 basename \
            | sort -u \
            | tr '\n' ' ')
          ALL_FNS=$(echo "$ALL_FNS" | xargs)
          echo "→ all functions on disk: $ALL_FNS"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ inputs.function }}"
            if [ "$INPUT" = "all" ]; then
              FNS="$ALL_FNS"
            else
              FNS="$INPUT"
            fi
            echo "sync_secrets=${{ inputs.sync_secrets }}" >> "$GITHUB_OUTPUT"
          else
            # Push event: derive the changed function set from the diff.
            # If the workflow file itself changed, fall back to deploy-all so
            # backfills work after a workflow refactor.
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
            CHANGED=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || true)
            WORKFLOW_TOUCHED=$(echo "$CHANGED" | grep -E '^\.github/workflows/deploy-functions\.yml$' || true)
            if [ -n "$WORKFLOW_TOUCHED" ]; then
              echo "→ workflow file changed; deploying all functions"
              FNS="$ALL_FNS"
            else
              FNS=$(echo "$CHANGED" \
                | grep -E '^supabase/functions/' \
                | awk -F/ 'NF>=3 && $3!="" {print $3}' \
                | sort -u \
                | tr '\n' ' ')
            fi
            FNS=$(echo "$FNS" | xargs)
            if [ -z "$FNS" ]; then
              echo "→ no function-code changes detected; skipping deploy"
            else
              echo "→ deploying: $FNS"
            fi
            # On push, never resync secrets — that's a privileged op reserved
            # for explicit dispatch.
            echo "sync_secrets=false" >> "$GITHUB_OUTPUT"
          fi
          echo "fns=$FNS" >> "$GITHUB_OUTPUT"

      - name: Sync GitHub secrets → Supabase
        if: ${{ steps.targets.outputs.sync_secrets == 'true' && steps.targets.outputs.fns != '' }}
        env:
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT_URL:      ${{ secrets.R2_ENDPOINT_URL }}
          PUBLIC_R2_MEDIA_URL:  ${{ secrets.PUBLIC_R2_MEDIA_URL }}
          CF_ACCOUNT_ID:        ${{ secrets.CF_ACCOUNT_ID }}
          PUBLIC_PLANTNET_KEY:  ${{ secrets.PUBLIC_PLANTNET_KEY }}
          PLANTNET_API_KEY:     ${{ secrets.PLANTNET_API_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          VAPID_PRIVATE_KEY:    ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY:     ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_SUBJECT:        ${{ secrets.VAPID_SUBJECT }}
          STRIPE_SECRET_KEY:    ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          OPERATOR_EMAIL:       ${{ secrets.OPERATOR_EMAIL }}
        run: |
          set -e

          push_secret() {
            local supabase_name="$1"
            local val="$2"
            if [ -n "$val" ]; then
              echo "→ syncing $supabase_name"
              supabase secrets set "$supabase_name=$val" --project-ref "$PROJECT_REF" >/dev/null
            else
              echo "→ skipping $supabase_name (no value in GitHub)"
            fi
          }

          if [ -z "${CF_ACCOUNT_ID:-}" ] && [ -n "${R2_ENDPOINT_URL:-}" ]; then
            CF_ACCOUNT_ID=$(echo "$R2_ENDPOINT_URL" \
              | sed -E 's#^https?://([0-9a-f]+)\.r2\.cloudflarestorage\.com/?$#\1#')
            if [ "$CF_ACCOUNT_ID" = "$R2_ENDPOINT_URL" ]; then
              echo "warn: could not parse CF_ACCOUNT_ID from R2_ENDPOINT_URL=$R2_ENDPOINT_URL"
              CF_ACCOUNT_ID=""
            fi
          fi

          push_secret R2_ACCESS_KEY_ID      "${R2_ACCESS_KEY_ID:-}"
          push_secret R2_SECRET_ACCESS_KEY  "${R2_SECRET_ACCESS_KEY:-}"
          push_secret R2_BUCKET_NAME        "${R2_BUCKET:-}"
          push_secret R2_ENDPOINT_URL       "${R2_ENDPOINT_URL:-}"
          push_secret R2_PUBLIC_URL         "${PUBLIC_R2_MEDIA_URL:-}"
          push_secret CF_ACCOUNT_ID         "${CF_ACCOUNT_ID:-}"

          PLANTNET="${PLANTNET_API_KEY:-${PUBLIC_PLANTNET_KEY:-}}"
          push_secret PLANTNET_API_KEY      "$PLANTNET"
          push_secret ANTHROPIC_API_KEY     "${ANTHROPIC_API_KEY:-}"

          push_secret VAPID_PRIVATE_KEY     "${VAPID_PRIVATE_KEY:-}"
          push_secret VAPID_PUBLIC_KEY      "${VAPID_PUBLIC_KEY:-}"
          push_secret VAPID_SUBJECT         "${VAPID_SUBJECT:-mailto:hello@rastrum.org}"

          push_secret STRIPE_SECRET_KEY     "${STRIPE_SECRET_KEY:-}"
          push_secret STRIPE_WEBHOOK_SECRET "${STRIPE_WEBHOOK_SECRET:-}"

          # Module 26 — report function emails the operator via Resend
          push_secret RESEND_API_KEY        "${RESEND_API_KEY:-}"
          push_secret OPERATOR_EMAIL        "${OPERATOR_EMAIL:-}"

      - name: Deploy
        if: ${{ steps.targets.outputs.fns != '' }}
        run: |
          set -e
          # Functions that don't require a user JWT at the Edge layer:
          #   share-card        — OG scrapers fetch anonymously
          #   recompute-streaks — cron-only; gates internally on service-role
          #   award-badges      — cron-only; gates internally on service-role
          #   plantnet-monitor  — cron-only; gates internally on service-role
          #   streak-push       — cron-only; gates internally on service-role
          #   mcp / api         — gate internally on rst_ tokens (not JWTs)
          # Module 26 functions (follow / react / report) DO verify JWT.
          NO_JWT="share-card recompute-streaks award-badges plantnet-monitor streak-push mcp api"
          deploy_one() {
            local fn="$1"
            local flag=""
            for nj in $NO_JWT; do [ "$fn" = "$nj" ] && flag="--no-verify-jwt"; done
            echo "→ deploying $fn $flag"
            supabase functions deploy "$fn" --project-ref "$PROJECT_REF" $flag
          }
          for fn in ${{ steps.targets.outputs.fns }}; do
            deploy_one "$fn"
          done

      - name: Audit CORS on every browser-facing function
        if: ${{ steps.targets.outputs.fns != '' }}
        run: |
          # Give Supabase a beat to propagate the deploy.
          sleep 5
          ./scripts/audit-edge-cors.sh
