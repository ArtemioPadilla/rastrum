name: db-apply

# Apply idempotent SQL (schema + cron) to the production Supabase Postgres.
#
# Trigger paths:
#   - workflow_dispatch — manual safety valve, fires regardless of file changes.
#   - push to main with relevant SQL files changed — auto-apply on merge.
#
# Required secret: SUPABASE_DB_URL (postgres://… connection string from
# Supabase dashboard → Settings → Database → Connection string).
#
# Optional secret: SPONSORSHIPS_CRON_TOKEN — GitHub secret used by the
# ai_credentials_heartbeat pg_cron job to authenticate against the
# sponsorships Edge Function. Generate once with `openssl rand -hex 32`,
# store via:
#   gh secret set SPONSORSHIPS_CRON_TOKEN
# The Edge Function reads the same secret name from its env vars (synced
# by deploy-functions.yml) to validate inbound heartbeat requests. When
# present, the "Sync cron token to Vault" step below upserts it as a
# Supabase Vault secret named `sponsorships_cron_token`, which the
# pg_cron job reads via `vault.decrypted_secrets`. We use Vault instead
# of `ALTER DATABASE … SET` because Supabase managed Postgres restricts
# database-level GUC writes to superuser, and the workflow's `postgres`
# role isn't superuser.
#
# All SQL in this repo is written to be idempotent (CREATE … IF NOT EXISTS,
# DROP POLICY IF EXISTS … ; CREATE POLICY …, ON CONFLICT DO UPDATE).
# Re-runs are safe.
#
# Hardening (post-2026-04-29):
#   - actions/checkout@v4 with fetch-depth: 0 so `git diff <before> <sha>`
#     can resolve the parent commit. The previous default depth=1 caused
#     "fatal: bad object" which `|| true` tolerated, silently skipping
#     the apply — that's how PR #42's schema didn't reach prod despite the
#     workflow reporting "success".
#   - Decision banner — every run prints "schema=… cron=…" so skips are
#     visible at a glance.
#   - Sentinel verify — after apply, assert that critical tables and
#     functions exist. Catches partial-apply states (e.g., when the apply
#     fails mid-file, leaving some objects created and others not).

on:
  workflow_dispatch:
    inputs:
      run_rarity_refresh:
        description: 'Run refresh_taxon_rarity() once after apply'
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - 'docs/specs/infra/supabase-schema.sql'
      - 'docs/specs/infra/cron-schedules.sql'

concurrency:
  group: db-apply-prod
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PGCONNECT_TIMEOUT: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed SQL files
        id: changes
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "schema=true"  >> "$GITHUB_OUTPUT"
            echo "cron=true"    >> "$GITHUB_OUTPUT"
            echo "::notice::workflow_dispatch — applying both schema and cron"
            exit 0
          fi
          # Force-push or first push to branch: github.event.before is 40 zeros.
          # Replay both files defensively (idempotent).
          before='${{ github.event.before }}'
          if [ "$before" = "0000000000000000000000000000000000000000" ] || [ -z "$before" ]; then
            echo "schema=true"  >> "$GITHUB_OUTPUT"
            echo "cron=true"    >> "$GITHUB_OUTPUT"
            echo "::notice::no diff base (first/force push) — applying both"
            exit 0
          fi
          # If we cannot resolve `before` (shallow clone, force-push gone, etc.)
          # we previously fell back to schema=false which silently skipped the
          # apply step. That hid PR #42's schema for a day. Fail loud instead;
          # operator can re-fire via workflow_dispatch which always applies.
          if ! git cat-file -e "${before}^{commit}" 2>/dev/null; then
            echo "::error::Cannot resolve before-SHA ${before} (shallow clone? rewritten history?). Refusing to silently skip — re-run via workflow_dispatch to apply unconditionally."
            exit 1
          fi
          changed=$(git diff --name-only "$before" "${{ github.sha }}")
          echo "Changed files between $before and ${{ github.sha }}:"
          echo "$changed"
          if echo "$changed" | grep -qx 'docs/specs/infra/supabase-schema.sql'; then
            echo "schema=true" >> "$GITHUB_OUTPUT"
          else
            echo "schema=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$changed" | grep -qx 'docs/specs/infra/cron-schedules.sql'; then
            echo "cron=true" >> "$GITHUB_OUTPUT"
          else
            echo "cron=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decision banner
        run: |
          echo "::notice::Apply plan — schema=${{ steps.changes.outputs.schema }} cron=${{ steps.changes.outputs.cron }}"
          if [ "${{ steps.changes.outputs.schema }}" = "false" ] && [ "${{ steps.changes.outputs.cron }}" = "false" ]; then
            echo "::warning::No SQL files changed — both apply steps will be skipped."
          fi

      - name: Apply schema
        if: steps.changes.outputs.schema == 'true'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f docs/specs/infra/supabase-schema.sql

      - name: Sync cron token to Vault (idempotent)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SPONSORSHIPS_CRON_TOKEN: ${{ secrets.SPONSORSHIPS_CRON_TOKEN }}
        if: env.SPONSORSHIPS_CRON_TOKEN != ''
        run: |
          # Top-level :'var' substitution works (no $$-quoted block).
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 \
            -v cron_token="$SPONSORSHIPS_CRON_TOKEN" <<'EOF'
          SELECT public.upsert_vault_secret_by_name('sponsorships_cron_token', :'cron_token');
          EOF
          echo "sponsorships_cron_token synced to Vault."

      - name: Apply cron schedules
        if: steps.changes.outputs.cron == 'true'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f docs/specs/infra/cron-schedules.sql

      - name: Sentinel verify (critical tables and functions exist)
        # Always runs when schema was applied — confirms the apply actually
        # took effect. Catches partial-apply states (e.g., when the apply
        # fails mid-file). The SQL itself lives in scripts/db-sentinel.sql
        # so db-validate.yml uses the exact same definition.
        if: always() && steps.changes.outputs.schema == 'true'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f scripts/db-sentinel.sql

      - name: Backfill primary_taxon_id (idempotent — runs after every schema apply)
        # Resolves taxon_id on identifications that have scientific_name but no
        # taxon_id, promotes sole identifications to is_primary, and backfills
        # observations.primary_taxon_id. Safe to re-run (idempotent WHERE clauses).
        # This covers observations submitted before the sync_primary_identification
        # trigger gained the scientific_name fallback lookup.
        if: steps.changes.outputs.schema == 'true'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          # First create any missing taxa from scientific_names in identifications,
          # then resolve taxon_id on identifications + backfill primary_taxon_id.
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f scripts/backfill-taxa-from-identifications.sql
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f scripts/backfill-primary-taxon-id.sql
          echo "::notice::primary_taxon_id backfill complete"

      - name: Diagnose location trigger (always — non-fatal)
        if: always()
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$SUPABASE_DB_URL" -f scripts/diagnose-location-trigger.sql || true
          echo "::notice::location trigger diagnosis complete"

      - name: Backfill place_id (idempotent — runs after every schema apply)
        # M-Loc-1: Assigns place_id to existing synced observations that have a
        # location but no place_id. Safe to re-run (idempotent WHERE clause).
        # Only matches named places (place_type != 'h3_cell'); H3 fallback cells
        # are created by the trigger on future INSERT/UPDATE.
        if: steps.changes.outputs.schema == 'true'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f scripts/backfill-place-id.sql
          echo "::notice::place_id backfill complete"

      - name: Refresh taxon_rarity (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch' && inputs.run_rarity_refresh == true
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -c "SELECT public.refresh_taxon_rarity();"
