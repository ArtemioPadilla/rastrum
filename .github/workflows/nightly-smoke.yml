name: Nightly smoke (production)

# Cron-fired Playwright smoke against rastrum.org. The full e2e suite runs
# on every PR; this is the "is the site up at 9 AM?" canary, focused on
# the per-route HTTP + console-error checks in tests/e2e/smoke.spec.ts.
#
# On failure we open (or comment on) a tracking issue and upload the
# Playwright HTML report + screenshots as artifacts.
on:
  schedule:
    - cron: '17 9 * * *'  # 09:17 UTC daily — keep this off the top of the hour
  workflow_dispatch:

permissions:
  issues: write
  contents: read

concurrency:
  group: nightly-smoke
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PLAYWRIGHT_BASE_URL: https://rastrum.org/
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke spec against production
        run: npx playwright test tests/e2e/smoke.spec.ts --project=chromium

      - name: Upload Playwright report
        if: always() && failure()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-smoke-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      - name: Open or update tracking issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Nightly smoke failure (rastrum.org)';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `Nightly smoke against \`${process.env.PLAYWRIGHT_BASE_URL}\` failed.`,
              ``,
              `- Run: ${runUrl}`,
              `- Date: ${new Date().toISOString()}`,
              `- Spec: \`tests/e2e/smoke.spec.ts\``,
              ``,
              `Artifacts (HTML report + traces) attached to the run. Look at`,
              `the failing assertion message + the auto-screenshot before reaching`,
              `for the full trace.`,
            ].join('\n');

            // Find an open tracking issue with the canonical title; if
            // present, comment so we don't fan out one issue per night.
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'smoke-test',
              per_page: 50,
            });
            const tracker = existing.find(i => i.title === title);
            if (tracker) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: tracker.number,
                body,
              });
              core.notice(`Commented on existing tracker #${tracker.number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['smoke-test', 'bug'],
              });
              core.notice(`Opened tracker #${created.number}`);
            }
