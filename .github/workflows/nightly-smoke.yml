name: Nightly Smoke Test

on:
  schedule:
    # Run at 06:00 UTC daily (midnight CST)
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests against production
        env:
          PLAYWRIGHT_BASE_URL: https://rastrum.org
        run: npx playwright test tests/e2e/smoke.spec.ts --project=chromium --reporter=list

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-smoke-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7
