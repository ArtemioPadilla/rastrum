name: Bug report
description: Something is broken or behaves unexpectedly.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the form so we can reproduce and triage quickly.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal repro steps.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / logs
      description: Drag-and-drop screenshots or paste logs (optional).
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Auto-prefilled by the in-app reporter when possible (URL, user agent, locale, build, online status, viewport, timestamp).
      placeholder: |
        - URL:
        - User Agent:
        - Locale:
        - Build:
        - Online:
        - Viewport:
        - Time:
    validations:
      required: false
