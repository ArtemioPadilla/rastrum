name: Question
description: Ask a question about Rastrum.
title: "[Question]: "
labels: ["question", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        For broad discussions consider starting a GitHub Discussion. Use this form for focused questions.
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to do? Provide enough background for someone unfamiliar with your setup.
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What's the question?
    validations:
      required: true
