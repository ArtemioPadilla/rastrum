# Label catalog for Rastrum. Synced to the repo by sync-labels.yml.
# Colors are 6-char hex (no leading #).
- name: bug
  color: d73a4a
  description: Something isn't working
- name: enhancement
  color: a2eeef
  description: New feature or improvement
- name: question
  color: d876e3
  description: Further information is requested
- name: i18n
  color: 1d76db
  description: Translation / localization issue
- name: triage
  color: ededed
  description: Needs initial review and labeling
- name: good-first-issue
  color: 7057ff
  description: Good entry point for new contributors
- name: auto-fix-candidate
  color: 0e8a16
  description: Eligible for automated fix via @copilot
- name: help-wanted
  color: 008672
  description: Extra attention is needed
